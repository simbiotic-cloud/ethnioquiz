<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs><clipPath id="irc"><rect x="12" y="12" width="376" height="256" rx="18"/></clipPath></defs>
  <g clip-path="url(#irc)">
    <rect x="12" y="12" width="376" height="85" fill="#239F40"/>
    <rect x="12" y="97" width="376" height="86" fill="#FFFFFF"/>
    <rect x="12" y="183" width="376" height="85" fill="#DA0000"/>
    <!-- Emblem simplified -->
    <g transform="translate(200,140)">
      <circle r="18" fill="#DA0000"/>
      <rect x="-3" y="-16" width="6" height="32" rx="2" fill="#fff"/>
      <circle r="6" fill="#DA0000"/>
    </g>
    <!-- Kufic border -->
    <rect x="12" y="93" width="376" height="4" fill="#239F40" opacity=".3"/>
    <rect x="12" y="183" width="376" height="4" fill="#DA0000" opacity=".3"/>
  </g>
  <rect x="12" y="12" width="376" height="256" rx="18" fill="none" stroke="#1a2744" stroke-width="10"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- White stripe on left -->
    <rect x="12" y="12" width="94" height="256" fill="#ffffff"/>
    <!-- Green main area -->
    <rect x="106" y="12" width="282" height="256" fill="#01411c"/>
    <!-- White crescent -->
    <circle cx="260" cy="140" r="52" fill="#ffffff"/>
    <circle cx="272" cy="132" r="42" fill="#01411c"/>
    <!-- White star -->
    <g transform="translate(298, 118)">
      <polygon points="0,-20 5,-6 18,-6 8,3 12,18 0,10 -12,18 -8,3 -18,-6 -5,-6" fill="#ffffff"/>
    </g>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
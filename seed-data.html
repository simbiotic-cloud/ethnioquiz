// Load existing DB or create new
let db;
try { db = JSON.parse(localStorage.getItem('eq3_entities')); } catch(e){}
if(!db || !db.entities) db = { entities: {} };

function ensureEntity(id, name, flag){
  if(!db.entities[id]) db.entities[id] = { id, name, flag, images: [] };
  else if(!db.entities[id].flag) db.entities[id].flag = flag;
}

function addImages(entityId, urls){
  const entity = db.entities[entityId];
  const existing = new Set(entity.images.map(i=>i.url));
  let added = 0;
  urls.forEach(url => {
    if(!existing.has(url)){
      entity.images.push({
        id: Date.now() + '_' + Math.random().toString(36).substr(2,6),
        url,
        shownCount: 0,
        lastShown: null
      });
      added++;
    }
  });
  return added;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- Saffron top stripe -->
    <rect x="12" y="12" width="376" height="85" fill="#ff9933"/>
    <!-- White middle stripe -->
    <rect x="12" y="97" width="376" height="86" fill="#ffffff"/>
    <!-- Green bottom stripe -->
    <rect x="12" y="183" width="376" height="85" fill="#138808"/>
    <!-- Ashoka Chakra (blue wheel) -->
    <circle cx="200" cy="140" r="30" fill="none" stroke="#000080" stroke-width="3"/>
    <circle cx="200" cy="140" r="4" fill="#000080"/>
    <!-- 24 spokes -->
    <g stroke="#000080" stroke-width="1.5">
      <line x1="200" y1="112" x2="200" y2="168"/>
      <line x1="172" y1="140" x2="228" y2="140"/>
      <line x1="180" y1="120" x2="220" y2="160"/>
      <line x1="220" y1="120" x2="180" y2="160"/>
      <line x1="186" y1="113" x2="214" y2="167"/>
      <line x1="214" y1="113" x2="186" y2="167"/>
      <line x1="173" y1="126" x2="227" y2="154"/>
      <line x1="227" y1="126" x2="173" y2="154"/>
      <line x1="175" y1="133" x2="225" y2="147"/>
      <line x1="225" y1="133" x2="175" y2="147"/>
      <line x1="193" y1="112" x2="207" y2="168"/>
      <line x1="207" y1="112" x2="193" y2="168"/>
    </g>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
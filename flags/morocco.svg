<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- Red background -->
    <rect x="12" y="12" width="376" height="256" fill="#c1272d"/>
    <!-- Green pentacle star (5-pointed star outline) -->
    <g transform="translate(200, 140)">
      <!-- Outer star -->
      <polygon points="0,-55 14,-17 55,-17 23,7 35,45 0,22 -35,45 -23,7 -55,-17 -14,-17"
               fill="none" stroke="#006233" stroke-width="6" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
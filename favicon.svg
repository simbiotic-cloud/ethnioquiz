<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="14" fill="#4CAF50" stroke="#2D8F4E" stroke-width="2"/>
  <!-- Globe horizontal lines -->
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="#2D8F4E" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="16" cy="16" rx="14" ry="10" fill="none" stroke="#2D8F4E" stroke-width="1" opacity="0.4"/>
  <!-- Globe vertical meridian -->
  <ellipse cx="16" cy="16" rx="5" ry="14" fill="none" stroke="#2D8F4E" stroke-width="1.2" opacity="0.6"/>
  <!-- Golden accent ring behind question mark -->
  <circle cx="16" cy="16" r="8" fill="#FFD700" opacity="0.85"/>
  <!-- Question mark -->
  <text x="16" y="21.5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">?</text>
</svg>

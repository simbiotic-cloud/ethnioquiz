<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle circles -->
  <circle cx="200" cy="500" r="300" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1000" cy="100" r="250" fill="rgba(255,215,0,0.03)"/>
  <!-- Globe emoji area -->
  <text x="600" y="200" text-anchor="middle" font-size="120" fill="#fff">🌍</text>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="88" font-weight="900" fill="#FFD700">ETHNIO</text>
  <text x="600" y="400" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" fill="#FF6633">QUIZ</text>
  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="32" fill="rgba(255,255,255,0.6)">Can You Tell Them Apart?</text>
  <!-- Flags -->
  <text x="340" y="560" text-anchor="middle" font-size="50">🇯🇵</text>
  <text x="440" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.3)">vs</text>
  <text x="540" y="560" text-anchor="middle" font-size="50">🇨🇳</text>
  <text x="660" y="560" text-anchor="middle" font-size="50">🇪🇸</text>
  <text x="760" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.3)">vs</text>
  <text x="860" y="560" text-anchor="middle" font-size="50">🟢</text>
</svg>

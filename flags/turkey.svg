<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- Red background -->
    <rect x="12" y="12" width="376" height="256" fill="#e30a17"/>
    <!-- White crescent -->
    <circle cx="175" cy="140" r="48" fill="#ffffff"/>
    <circle cx="188" cy="140" r="38" fill="#e30a17"/>
    <!-- White star -->
    <g transform="translate(235, 140)">
      <polygon points="0,-24 6,-7 24,-7 10,4 16,22 0,12 -16,22 -10,4 -24,-7 -6,-7" fill="#ffffff"/>
    </g>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- Red background -->
    <rect x="12" y="12" width="376" height="256" fill="#d52b1e"/>
    <!-- Green saltire (diagonal cross) -->
    <line x1="12" y1="12" x2="388" y2="268" stroke="#009b48" stroke-width="42"/>
    <line x1="388" y1="12" x2="12" y2="268" stroke="#009b48" stroke-width="42"/>
    <!-- White cross -->
    <rect x="178" y="12" width="44" height="256" fill="#ffffff"/>
    <rect x="12" y="118" width="376" height="44" fill="#ffffff"/>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
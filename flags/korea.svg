<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
    <clipPath id="taegeukTop">
      <rect x="150" y="95" width="100" height="45"/>
    </clipPath>
    <clipPath id="taegeukBottom">
      <rect x="150" y="140" width="100" height="45"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- White background -->
    <rect x="12" y="12" width="376" height="256" fill="#ffffff"/>
    <!-- Taegeuk (yin-yang) -->
    <!-- Red top half -->
    <circle cx="200" cy="140" r="42" fill="#cd2e3a"/>
    <!-- Blue bottom half -->
    <path d="M158,140 A42,42 0 0,1 242,140" fill="#cd2e3a"/>
    <path d="M158,140 A42,42 0 0,0 242,140" fill="#0047a0"/>
    <!-- Small red circle bottom -->
    <circle cx="200" cy="161" r="21" fill="#cd2e3a"/>
    <!-- Small blue circle top -->
    <circle cx="200" cy="119" r="21" fill="#0047a0"/>
    <!-- Trigrams - black bars -->
    <!-- Top-left trigram (Geon/Heaven) -->
    <g transform="translate(200,140) rotate(-55)">
      <rect x="55" y="-14" width="38" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="-4" width="38" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="6" width="38" height="6" rx="1" fill="#000000"/>
    </g>
    <!-- Bottom-right trigram (Gon/Earth) -->
    <g transform="translate(200,140) rotate(125)">
      <rect x="55" y="-14" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="-14" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="-4" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="-4" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="6" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="6" width="17" height="6" rx="1" fill="#000000"/>
    </g>
    <!-- Top-right trigram (Gam/Water) -->
    <g transform="translate(200,140) rotate(55)">
      <rect x="55" y="-14" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="-14" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="-4" width="38" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="6" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="6" width="17" height="6" rx="1" fill="#000000"/>
    </g>
    <!-- Bottom-left trigram (Ri/Fire) -->
    <g transform="translate(200,140) rotate(-125)">
      <rect x="55" y="-14" width="38" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="-4" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="76" y="-4" width="17" height="6" rx="1" fill="#000000"/>
      <rect x="55" y="6" width="38" height="6" rx="1" fill="#000000"/>
    </g>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <clipPath id="flagClip">
      <rect x="12" y="12" width="376" height="256" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#flagClip)">
    <!-- 9 alternating blue-white stripes -->
    <rect x="12" y="12" width="376" height="28.4" fill="#0d5eaf"/>
    <rect x="12" y="40.4" width="376" height="28.4" fill="#ffffff"/>
    <rect x="12" y="68.9" width="376" height="28.4" fill="#0d5eaf"/>
    <rect x="12" y="97.3" width="376" height="28.4" fill="#ffffff"/>
    <rect x="12" y="125.7" width="376" height="28.4" fill="#0d5eaf"/>
    <rect x="12" y="154.2" width="376" height="28.4" fill="#ffffff"/>
    <rect x="12" y="182.6" width="376" height="28.4" fill="#0d5eaf"/>
    <rect x="12" y="211" width="376" height="28.4" fill="#ffffff"/>
    <rect x="12" y="239.5" width="376" height="28.5" fill="#0d5eaf"/>
    <!-- Blue canton -->
    <rect x="12" y="12" width="155" height="142" fill="#0d5eaf"/>
    <!-- White cross in canton -->
    <rect x="12" y="64" width="155" height="24" fill="#ffffff"/>
    <rect x="77" y="12" width="24" height="142" fill="#ffffff"/>
  </g>
  <!-- Thick rounded border -->
  <rect x="12" y="12" width="376" height="256" rx="18" ry="18" fill="none" stroke="#1a2744" stroke-width="10" stroke-linejoin="round"/>
</svg>